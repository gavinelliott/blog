<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Fraunces:wght@500&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      width: 1200px;
      height: 627px;
      background: #F7F6F3;
      font-family: 'Bebas Neue', Impact, sans-serif;
      display: flex;
      align-items: center;
      padding: 60px 50px 60px 88px;
      overflow: hidden;
      position: relative;
    }
    .content {
      width: 100%;
      /* Keep long headlines from sitting under the absolutely positioned avatar */
      padding-right: 270px;
      box-sizing: border-box;
    }
    .headline {
      font-size: 108px;
      font-weight: 400;
      font-synthesis: none;
      line-height: 0.92;
      color: #1a1a1a;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }
    .headline.headline--four-lines {
      font-size: 88px;
      line-height: 0.9;
    }
    .headline-line {
      display: inline;
      box-decoration-break: clone;
      -webkit-box-decoration-break: clone;
      background-image: linear-gradient(to right, #B1C8AF 0%, #B1C8AF 100%);
      background-repeat: no-repeat;
      background-size: 100% 6px;
      /* Stripe sits just under the cap height / baseline, not at the bottom of the line box */
      background-position: 0 calc(1em - 4px);
      padding-bottom: 0;
    }
    .cta {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-top: 45px;
      background: #5C7C6B;
      color: white;
      padding: 16px 28px;
      border-radius: 6px;
      font-family: 'Fraunces', serif;
      font-size: 20px;
      font-weight: 500;
    }
    .cta svg {
      width: 20px;
      height: 20px;
    }
    /* Matches body padding-left so right margin of avatar = left margin of text */
    .avatar-container {
      position: absolute;
      right: 48px;
      top: 50%;
      transform: translateY(-50%);
    }
    .avatar {
      width: 260px;
      height: 260px;
      object-fit: contain;
    }
  </style>
</head>
<body>
  <div class="content">
    <h1 class="headline{{HEADLINE_CLASS}}">
      <span class="headline-line">{{LINE1}}</span><br>
      <span class="headline-line">{{LINE2}}</span><br>
      <span class="headline-line">{{LINE3}}</span>{{LINE4_BLOCK}}
    </h1>
    <div class="cta">
      {{CTA}}
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M5 12h14M12 5l7 7-7 7"/>
      </svg>
    </div>
  </div>
  <div class="avatar-container">
    <img class="avatar" src="{{AVATAR_SRC}}" alt="">
  </div>
</body>
</html>
